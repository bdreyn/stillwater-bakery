# -----------------------------------------------------------------------------
# Sveltia CMS configuration
# -----------------------------------------------------------------------------
# Edits made in /admin are committed straight to the `branch` below, which
# triggers the GitHub Pages rebuild. See the README for the one-time GitHub
# OAuth setup that lets you log in.
# -----------------------------------------------------------------------------

backend:
  name: github
  repo: bdreyn/stillwater-bakery
  branch: main
  # URL of your deployed sveltia-cms-auth OAuth relay (see README → Content editing).
  # Replace this placeholder before the CMS login will work.
  base_url: https://sveltia-cms-auth.bdreyn.workers.dev

# Uploaded photos are stored in the repo and served from the built site.
media_folder: "public/images/uploads"
public_folder: "/stillwater-bakery/images/uploads"

# Commit straight to the branch (simplest for a single editor).
# Switch to `editorial_workflow` if you'd rather review each change as a PR.
publish_mode: simple

collections:
  - name: menu
    label: Menu
    label_singular: Menu item
    description: Dishes shown on the home page and the full Menu page.
    folder: content/menu
    create: true
    delete: true
    format: json
    slug: "{{fields.name}}"
    identifier_field: name
    summary: "{{fields.name}} — {{fields.category}}"
    sortable_fields: [order, name, category, price]
    fields:
      - { name: name, label: Dish name, widget: string }
      - { name: description, label: Description, widget: text }
      - name: category
        label: Category
        widget: select
        options: ["Breads", "Pies & Tarts", "Cookies & Bars", "Seasonal Specials"]
      - { name: price, label: Price (USD), widget: number, value_type: float, min: 0, required: false }
      - { name: imageUrl, label: Photo, widget: image, required: false, hint: "Optional. Used on the Menu page cards, not the home-page list." }
      - { name: featured, label: Show on home page, widget: boolean, default: true, hint: "Turn off to keep this item on the full Menu page but hide it from the home page's This Week's Menu section." }
      - { name: order, label: Sort order, widget: number, value_type: int, default: 100, hint: "Lower numbers appear first." }

  - name: events
    label: Events
    label_singular: Event
    description: Markets and pop-ups shown on the home page and Events page.
    folder: content/events
    create: true
    delete: true
    format: json
    slug: "{{fields.title}}"
    identifier_field: title
    summary: "{{fields.title}} — {{fields.date}}"
    sortable_fields: [order, date, title]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: text, required: false }
      - { name: date, label: Date, widget: string, hint: "e.g. 2025-06-14" }
      - { name: time, label: Time, widget: string, required: false, hint: "e.g. 8am – 12pm" }
      - { name: venue, label: Venue, widget: string, required: false }
      - { name: city, label: City, widget: string, required: false }
      - { name: past, label: Past event?, widget: boolean, default: false, hint: "Turn on to move it into the Past Events list." }
      - { name: order, label: Sort order, widget: number, value_type: int, default: 100 }

  - name: site
    label: Site
    description: Gallery photos and contact details.
    files:
      - name: gallery
        label: Gallery
        file: content/gallery.json
        fields:
          - name: items
            label: Photos
            label_singular: Photo
            widget: list
            fields:
              - { name: imageUrl, label: Photo, widget: image }
              - { name: caption, label: Caption, widget: string, required: false }
      - name: settings
        label: Contact & Social
        file: content/settings/site.json
        fields:
          - { name: logo, label: Logo, widget: image, required: false, hint: "Replaces the text site name in the header (and the footer, unless a separate footer logo is set below). Leave empty to keep the text name." }
          - { name: footerLogo, label: Footer logo (optional), widget: image, required: false, hint: "Overrides the logo shown in the footer only. Leave empty to reuse the header logo above." }
          - { name: tagline, label: Footer tagline, widget: string }
          - { name: email, label: Email, widget: string }
          - { name: instagram, label: Instagram handle, widget: string, hint: "e.g. @stillwaterbakery" }
          - { name: instagramUrl, label: Instagram URL, widget: string }
          - { name: facebookUrl, label: Facebook URL, widget: string }
          - { name: location, label: Location, widget: string }
      - name: announcement
        label: Announcement Banner
        file: content/settings/announcement.json
        fields:
          - { name: text, label: Banner text, widget: string, hint: "Shown in a bar at the top of the home page. Visitors can dismiss it for their session." }

  - name: pages
    label: Page Content
    description: Headings and copy blocks shown on each page.
    files:
      - name: home
        label: Home Page
        file: content/pages/home.json
        fields:
          - { name: heroImage, label: Hero background image, widget: image, required: false, hint: "Optional. Displayed full-width behind the hero heading, cropped to cover the space, with a soft overlay so the text stays readable." }
          - { name: heroHeading, label: Hero heading, widget: string, hint: "HTML is allowed, e.g. <br> for a manual line break." }
          - { name: heroSubtext, label: Hero subtext, widget: text }
          - { name: menuHeading, label: "\"This Week's Menu\" section heading", widget: string }
          - { name: menuIntro, label: "\"This Week's Menu\" section intro", widget: text }
          - { name: aboutText, label: About snippet paragraph, widget: text }
          - { name: eventsHeading, label: "\"Find Us Next At\" section heading", widget: string }
      - name: about
        label: About Page
        file: content/pages/about.json
        fields:
          - { name: heroHeading, label: Hero heading, widget: string, hint: "HTML is allowed, e.g. <br> for a manual line break." }
          - { name: storyP1, label: Story — paragraph 1, widget: text }
          - { name: storyP2, label: Story — paragraph 2, widget: text }
          - { name: storyP3, label: Story — paragraph 3, widget: text }
          - name: values
            label: Values cards
            widget: list
            hint: "Exactly 3 cards are shown, each with its own icon."
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
      - name: order
        label: How to Order Page
        file: content/pages/order.json
        fields:
          - { name: heroHeading, label: Hero heading, widget: string }
          - { name: intro, label: Intro text, widget: text }
          - name: steps
            label: Steps
            widget: list
            hint: "The numbered circle is generated automatically from each step's position."
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
          - { name: notice, label: Lead-time notice, widget: text, hint: "HTML is allowed, e.g. <strong> for bold text." }
      - name: menu
        label: Menu Page
        file: content/pages/menu.json
        fields:
          - { name: heroHeading, label: Hero heading, widget: string }
          - { name: heroSubtext, label: Hero subtext, widget: text }
      - name: events
        label: Events Page
        file: content/pages/events.json
        fields:
          - { name: heroHeading, label: Hero heading, widget: string }
          - { name: heroSubtext, label: Hero subtext, widget: text }
      - name: galleryPage
        label: Gallery Page
        file: content/pages/gallery.json
        fields:
          - { name: heroHeading, label: Hero heading, widget: string }
      - name: contact
        label: Contact Page
        file: content/pages/contact.json
        fields:
          - { name: heroHeading, label: Hero heading, widget: string }
          - { name: intro, label: Intro text, widget: text }
